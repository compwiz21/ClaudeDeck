<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Launch Claude Session</title>
  <script src="sdpi-components.js"></script>
</head>
<body>
  <sdpi-item label="Project Path">
    <sdpi-textfield setting="projectPath" placeholder="C:\Projects\MyApp"></sdpi-textfield>
  </sdpi-item>
  <sdpi-item label="Session Name">
    <sdpi-textfield setting="sessionName" placeholder="Claude"></sdpi-textfield>
  </sdpi-item>
  <sdpi-item label="Tab Color">
    <sdpi-color setting="tabColor" default="#6B4FBB"></sdpi-color>
  </sdpi-item>
</body>
</html>
